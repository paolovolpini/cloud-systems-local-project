apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: shortener-frontend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: shortener-frontend
  minReplicas: 2
  maxReplicas: 4 
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60 # solo per testing!      