---
- name: Sets up load balancer
  hosts: loadbalancer
  become: true

  tasks:

    - name: Install haproxy
      apt:
        name: haproxy
        update-cache: true

    - name: Update config
      copy:
        dest: /etc/haproxy/haproxy.cfg
        src: ~/tofu-gen/haproxy.cfg
    
    - name: Restart haproxy
      service:
        name: haproxy
        state: restarted
        enabled: true
